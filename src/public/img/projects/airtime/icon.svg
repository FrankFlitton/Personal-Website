<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8fb6f9"/>
      <stop offset="1" stop-color="#5b8def"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#1c3a73" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#gloss)"/>

  <!-- Stacked talk-time bar: 3 white segments (participants) -->
  <g filter="url(#shadow)">
    <rect x="20" y="50" width="35" height="28" rx="8" fill="#ffffff"/>
    <rect x="60" y="50" width="25" height="28" rx="8" fill="#ffffff"/>
    <rect x="90" y="50" width="18" height="28" rx="8" fill="#ffffff"/>
  </g>

  <!-- Fair-share marker: the largest talker overshoots it -->
  <rect x="44" y="40" width="6" height="48" rx="3" fill="#ffce3a"/>
</svg>
